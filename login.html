<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Login</title>
    <meta name="description" content="This is the login page">
    <meta name="robots" content="noindex nofollow">
    <meta http-equiv="author" content="Kaiden">
    <meta http-equiv="pragma" content="no-cache">
    
    <link rel="stylesheet" href="css/login.css">
  </head>
  
  <body>
    <form action="php/login.php" method="post" id="login">
      
      <h1>Login</h1>
        
      <p> 
        <span class="text_label">Username:</span> 
        <input type="text" name="username" class="text_input" required />
      </p>
      
      <p> 
        <span class="text_label">Password:</span> 
        <input type="password" name="password" class="text_input" required /> 
      </p>
        
      <input type="submit" id="submit" value="Log In"><br>
        
      <p> Request Access Button <br>
        <a href="access.html" class="request-access-btn">
          <span>Request Access</span>
        </a>
      </p>
    </form>
    
  </body>
</html>

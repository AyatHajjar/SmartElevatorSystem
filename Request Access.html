<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Ayat Hajjar">
    <meta name="description" content="Request Access page">
    <meta name="robots" content="index, follow">
    <meta http-equiv="pragma" content="no-cache">

    <title>Request Access</title>

    <link rel="stylesheet" href="css/site_style.css">
    <link rel="stylesheet" href="css/request_style.css">
    <script src="js/request.js" defer></script>
</head>

<body>
<div class="container">

<header>
    <h1>Request Access</h1>
</header>

<nav>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Project VI</a></li>
        <li><a href="project_details.html">Project Details</a></li>
        <li><a href="login.html">Login</a></li>
    </ul>
</nav>

<main>
    <form id="requestForm">
        <fieldset>
            <legend>Personal Information</legend>

            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" name="fullName">

            <label for="email">Email:</label>
            <input type="email" id="email" name="email">

            <label for="role">Role:</label>
            <input type="text" id="role" name="role">
        </fieldset>

        <fieldset>
            <legend>Access Information</legend>

            <label for="reason">Reason for Access:</label>
            <textarea id="reason" name="reason" maxlength="200"></textarea>

            <p id="charCount">180 characters remaining</p>
            <p id="requestMessage"></p>
        </fieldset>

        <button type="submit">Submit Request</button>
        <button type="reset">Reset</button>
    </form>
</main>

<footer>
    Copyright © <span id="year"></span> Ayat Hajjar
</footer>

</div>
</body>
</html>
